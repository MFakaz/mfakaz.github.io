<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Slug Copier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #2d3748;
            margin-bottom: 24px;
            font-size: 24px;
            font-weight: 700;
        }

        .search-wrapper {
            margin-bottom: 20px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 18px;
        }

        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            min-width: 140px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            padding: 40px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #c53030;
            font-size: 14px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .file-list {
            display: none;
            margin-bottom: 20px;
        }

        .file-list.show {
            display: block;
        }

        .list-header {
            background: #f7fafc;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }

        .file-item {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .file-item:hover {
            border-color: #667eea;
            background: #f7fafc;
            transform: translateX(4px);
        }

        .file-item.active {
            border-color: #667eea;
            background: #eef2ff;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .file-icon {
            color: #a0aec0;
            font-size: 18px;
            flex-shrink: 0;
        }

        .file-item.active .file-icon {
            color: #667eea;
        }

        .file-name {
            font-weight: 500;
            color: #2d3748;
            font-size: 15px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chapter-badge {
            background: #edf2f7;
            color: #4a5568;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .file-item.active .chapter-badge {
            background: #667eea;
            color: white;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #718096;
            display: none;
        }

        .no-results.show {
            display: block;
        }

        .result-section {
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .comic-title {
            background: #f7fafc;
            padding: 16px 20px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            margin-bottom: 20px;
            text-align: center;
        }

        .comic-title h2 {
            color: #2d3748;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .comic-title p {
            color: #718096;
            font-size: 14px;
        }

        .chapter-selector {
            background: #f7fafc;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            margin-bottom: 16px;
        }

        .chapter-selector label {
            display: block;
            color: #2d3748;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .chapter-selector select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chapter-selector select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .box {
            background: #f7fafc;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            margin-bottom: 16px;
        }

        .box:last-child {
            margin-bottom: 0;
        }

        h3 {
            color: #2d3748;
            margin-bottom: 12px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .content-display {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 14px;
            max-height: 200px;
            overflow-y: auto;
            word-break: break-all;
            margin-bottom: 12px;
        }

        .content-display code {
            color: #2d3748;
            font-size: 15px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Courier New', monospace;
            line-height: 1.5;
        }

        .content-display pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 13px;
            color: #2d3748;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Courier New', monospace;
            line-height: 1.6;
        }

        .btn-copy {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-copy.slug {
            background: #667eea;
            color: white;
        }

        .btn-copy.slug:hover {
            background: #5568d3;
        }

        .btn-copy.slug:active {
            transform: scale(0.98);
            background: #4c51bf;
        }

        .btn-copy.img {
            background: #48bb78;
            color: white;
        }

        .btn-copy.img:hover {
            background: #38a169;
        }

        .btn-copy.img:active {
            transform: scale(0.98);
            background: #2f855a;
        }

        .icon {
            font-size: 18px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #2d3748;
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .content-display::-webkit-scrollbar {
            width: 6px;
        }

        .content-display::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .content-display::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 10px;
        }

        .content-display::-webkit-scrollbar-thumb:hover {
            background: #a0aec0;
        }

        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 20px;
                margin-bottom: 20px;
            }

            .stat-card {
                min-width: 100px;
            }

            .stat-value {
                font-size: 24px;
            }
            
            .btn-copy {
                padding: 16px;
                font-size: 15px;
            }
            
            .content-display {
                max-height: 150px;
                font-size: 13px;
            }

            .file-name {
                font-size: 14px;
            }

            .chapter-badge {
                font-size: 12px;
                padding: 3px 10px;
            }

            .comic-title h2 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 Comic Slug Copier</h1>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Total Files</div>
                <div class="stat-value" id="totalFiles">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Chapters</div>
                <div class="stat-value" id="totalChapters">0</div>
            </div>
        </div>
        
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input 
                type="text" 
                id="searchInput" 
                class="search-input" 
                placeholder="Cari file komik..."
                autocomplete="off"
            >
        </div>

        <div id="loading" class="loading">⏳ Memuat file...</div>
        <div id="error" class="error"></div>

        <div id="fileList" class="file-list">
            <div class="list-header">📁 Daftar File Komik</div>
            <div id="fileListContainer"></div>
            <div id="noResults" class="no-results">
                <div style="font-size: 48px; margin-bottom: 12px;">🔍</div>
                <div>Tidak ada file yang ditemukan</div>
            </div>
        </div>

        <div id="result" class="result-section">
            <div class="comic-title">
                <h2 id="comicTitle"></h2>
                <p id="comicChapterCount"></p>
            </div>

            <div class="chapter-selector">
                <label for="chapterSelect">📖 Pilih Chapter</label>
                <select id="chapterSelect"></select>
            </div>

            <div class="box">
                <h3><span class="icon">🔗</span> Slug Komik</h3>
                <div class="content-display">
                    <code id="slugDisplay"></code>
                </div>
                <button id="copySlugBtn" class="btn-copy slug">
                    <span class="icon">📋</span> Salin Slug
                </button>
            </div>

            <div class="box">
                <h3><span class="icon">🖼️</span> Kode IMG</h3>
                <div class="content-display">
                    <pre id="imgCodeDisplay"></pre>
                </div>
                <button id="copyImgBtn" class="btn-copy img">
                    <span class="icon">📋</span> Salin Kode IMG
                </button>
            </div>
        </div>

        <div id="toast" class="toast"></div>
    </div>

    <script>
        const availableFiles = [
            'file1.txt',
        ];

        let allFiles = [];
        let currentFileData = null;
        let selectedFile = null;

        const searchInput = document.getElementById('searchInput');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const fileList = document.getElementById('fileList');
        const fileListContainer = document.getElementById('fileListContainer');
        const noResults = document.getElementById('noResults');
        const result = document.getElementById('result');
        const comicTitle = document.getElementById('comicTitle');
        const comicChapterCount = document.getElementById('comicChapterCount');
        const chapterSelect = document.getElementById('chapterSelect');
        const slugDisplay = document.getElementById('slugDisplay');
        const imgCodeDisplay = document.getElementById('imgCodeDisplay');
        const copySlugBtn = document.getElementById('copySlugBtn');
        const copyImgBtn = document.getElementById('copyImgBtn');
        const toast = document.getElementById('toast');
        const totalFilesEl = document.getElementById('totalFiles');
        const totalChaptersEl = document.getElementById('totalChapters');

        function extractChapterNumber(fileName) {
            const match = fileName.match(/chapter[_-]?(\d+)/i) || 
                         fileName.match(/ch[_-]?(\d+)/i) ||
                         fileName.match(/c(\d+)/i);
            return match ? match[1] : null;
        }

        function detectTxtFiles() {
            loading.classList.add('show');
            
            setTimeout(() => {
                allFiles = availableFiles.filter(file => file.endsWith('.txt')).sort();
                
                if (allFiles.length === 0) {
                    loading.classList.remove('show');
                    showError('❌ Tidak ada file .txt ditemukan');
                    return;
                }
                
                updateStats();
                renderFileList(allFiles);
                loading.classList.remove('show');
                fileList.classList.add('show');
            }, 500);
        }

        function updateStats() {
            totalFilesEl.textContent = allFiles.length;
            
            const chapterCount = currentFileData ? currentFileData.chapters.length : 0;
            totalChaptersEl.textContent = chapterCount;
        }

        function renderFileList(files) {
            fileListContainer.innerHTML = '';
            
            if (files.length === 0) {
                noResults.classList.add('show');
                return;
            }
            
            noResults.classList.remove('show');
            
            files.forEach(fileName => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.dataset.file = fileName;
                
                const fileInfo = document.createElement('div');
                fileInfo.className = 'file-info';
                
                const icon = document.createElement('span');
                icon.className = 'file-icon';
                icon.textContent = '📄';
                
                const name = document.createElement('span');
                name.className = 'file-name';
                name.textContent = fileName.replace('.txt', '');
                
                fileInfo.appendChild(icon);
                fileInfo.appendChild(name);
                item.appendChild(fileInfo);
                
                item.addEventListener('click', () => selectFile(fileName, item));
                
                fileListContainer.appendChild(item);
            });
        }

        async function selectFile(fileName, itemElement) {
            if (selectedFile) {
                selectedFile.classList.remove('active');
            }
            
            selectedFile = itemElement;
            selectedFile.classList.add('active');
            
            await loadFile(fileName);
        }

        function filterFiles(searchTerm) {
            const filtered = allFiles.filter(file => 
                file.toLowerCase().includes(searchTerm.toLowerCase())
            );
            renderFileList(filtered);
        }

        function parseContent(content) {
            const lines = content.trim().split('\n').map(line => line.trim()).filter(line => line);
            
            if (lines.length < 2) {
                throw new Error('Format file tidak valid');
            }
            
            const title = lines[0];
            const chapters = [];
            let currentChapter = null;
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i];
                const chapterMatch = line.match(/\[Chapter\s+(\d+)\]/i);
                
                if (chapterMatch) {
                    if (currentChapter) {
                        chapters.push(currentChapter);
                    }
                    currentChapter = {
                        number: chapterMatch[1],
                        images: []
                    };
                } else if (currentChapter && (line.startsWith('http://') || line.startsWith('https://'))) {
                    currentChapter.images.push(line);
                }
            }
            
            if (currentChapter) {
                chapters.push(currentChapter);
            }
            
            if (chapters.length === 0) {
                throw new Error('Tidak ada chapter ditemukan');
            }
            
            return { title, chapters };
        }

        function generateSlug(title, chapter) {
            const titleSlug = title.toLowerCase()
                .replace(/[^a-z0-9\s-]/g, '')
                .replace(/\s+/g, '-')
                .replace(/-+/g, '-')
                .trim();
            
            return `${titleSlug}-chapter-${chapter}`;
        }

        function generateImgCode(title, chapterNum, imageUrls) {
            return imageUrls.map((url, index) => {
                const imgNum = String(index + 1).padStart(2, '0');
                return `<img alt="${title} chapter ${chapterNum} gambar ${imgNum}" src="${url}" />`;
            }).join('\n');
        }

        function populateChapterSelect() {
            chapterSelect.innerHTML = '';
            
            currentFileData.chapters.forEach(chapter => {
                const option = document.createElement('option');
                option.value = chapter.number;
                option.textContent = `Chapter ${chapter.number} (${chapter.images.length} gambar)`;
                chapterSelect.appendChild(option);
            });
            
            updateChapterDisplay();
        }

        function updateChapterDisplay() {
            const selectedChapterNum = chapterSelect.value;
            const chapter = currentFileData.chapters.find(ch => ch.number === selectedChapterNum);
            
            if (!chapter) return;
            
            const slug = generateSlug(currentFileData.title, chapter.number);
            const imgCode = generateImgCode(currentFileData.title, chapter.number, chapter.images);
            
            slugDisplay.textContent = slug;
            imgCodeDisplay.textContent = imgCode;
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function showError(message) {
            error.textContent = message;
            error.classList.add('show');
            
            setTimeout(() => {
                error.classList.remove('show');
            }, 5000);
        }

        async function copyToClipboard(text, successMessage) {
            try {
                await navigator.clipboard.writeText(text);
                showToast(successMessage);
            } catch (err) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                
                try {
                    document.execCommand('copy');
                    showToast(successMessage);
                } catch (e) {
                    showToast('❌ Gagal menyalin');
                }
                
                document.body.removeChild(textarea);
            }
        }

        async function loadFile(fileName) {
            error.classList.remove('show');
            result.classList.remove('show');
            
            try {
                const response = await fetch(fileName);
                
                if (!response.ok) {
                    throw new Error('File tidak dapat diakses');
                }
                
                const content = await response.text();
                currentFileData = parseContent(content);
                
                comicTitle.textContent = currentFileData.title;
                comicChapterCount.textContent = `${currentFileData.chapters.length} Chapter`;
                
                populateChapterSelect();
                updateStats();
                
                result.classList.add('show');
                result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                
            } catch (err) {
                showError('❌ Error: ' + err.message);
            }
        }

        searchInput.addEventListener('input', (e) => {
            filterFiles(e.target.value);
        });

        chapterSelect.addEventListener('change', updateChapterDisplay);

        copySlugBtn.addEventListener('click', () => {
            copyToClipboard(slugDisplay.textContent, '✅ Slug berhasil disalin!');
        });

        copyImgBtn.addEventListener('click', () => {
            copyToClipboard(imgCodeDisplay.textContent, '✅ Kode IMG berhasil disalin!');
        });

        detectTxtFiles();
    </script>
</body>
</html>
